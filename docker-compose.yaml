services:
    backend:
        build: ./src/backend
        container_name: backend
        working_dir: /app
        ports:
            - "8001:8001"
        volumes:
            - ./src/backend:/app
            - /app/krasnoludki/bin
            - /app/krasnoludki/obj
            - ./src/backend/krasnoludki/Repositories/test_data:/app/test_data
        environment:
            - CONNECTION_STRING=Host=${DB_HOST};Port=${DB_PORT};Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}

        command: sh -c "dotnet test krasnoludki.Tests/krasnoludki.Tests.csproj && dotnet run --project krasnoludki"
    db: 
        build: ./src/db
        container_name: krasnoludki_db
        working_dir: /app
        ports:
            - "5434:5432"
        volumes:
            - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
    
    generator:
        build: ./src/generate
        container_name: generator_skrypt
        working_dir: /app
        volumes:
            - ./src/generate:/app
        command: tail -f /dev/null

    frontend:
        build: ./src/frontend
        container_name: frontend
        ports:
            - "3000:3000"